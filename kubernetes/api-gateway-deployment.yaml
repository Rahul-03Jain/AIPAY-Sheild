apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: your-registry/api-gateway:latest
          env:
            - name: AUTH_SERVICE_URL
              value: http://auth-service:4001
            - name: PAYMENT_SERVICE_URL
              value: http://payment-service:4002
            - name: FRAUD_SERVICE_URL
              value: http://fraud-detection-service:4003
            - name: ANALYTICS_SERVICE_URL
              value: http://analytics-service:4004
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:4005
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
